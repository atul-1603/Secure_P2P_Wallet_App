spring:
  application:
    name: p2p-wallet
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      pool-name: WalletDBPool
  jpa:
    open-in-view: false # Production-safe setting, disables open session in view
    hibernate:
      ddl-auto: none # Disable automatic schema generation; use Flyway migrations only
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_updates: true
        order_inserts: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: ${PORT:10000}

mail:
  from: ${MAIL_FROM:${SMTP_USERNAME:no-reply@wallet.local}}

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info,metrics

security:
  jwt:
    secret: ${JWT_SECRET:change-this-in-production-jwt-secret-key-minimum-32-bytes}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
  auth:
    otp-enabled: ${OTP_ENABLED:true}

payment:
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:}
    key-secret: ${RAZORPAY_KEY_SECRET:}
    currency: ${RAZORPAY_CURRENCY:INR}

app:
  upload-dir: ${APP_UPLOAD_DIR:uploads}
  encryption:
    bank-account-key: ${BANK_ACCOUNT_ENCRYPTION_KEY:local-dev-bank-key-change-before-prod}

withdrawal:
  processing:
    core-pool-size: ${WITHDRAWAL_PROCESSING_CORE_POOL_SIZE:2}
    max-pool-size: ${WITHDRAWAL_PROCESSING_MAX_POOL_SIZE:4}
    queue-capacity: ${WITHDRAWAL_PROCESSING_QUEUE_CAPACITY:100}

ai:
  provider: ${AI_PROVIDER:GEMINI}
  rate-limit:
    per-minute: ${AI_RATE_LIMIT_PER_MINUTE:30}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    url: ${OPENAI_URL:https://api.openai.com/v1/chat/completions}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    url: ${GEMINI_URL:https://generativelanguage.googleapis.com/v1beta/models}

logging:
  level:
    org.springframework: INFO
    com.yourapp: DEBUG