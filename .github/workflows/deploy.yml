name: CI/CD Pipeline Secure P2P Wallet

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.REGION }}
  GAR_LOCATION: ${{ secrets.REGION }}
  REPOSITORY: ${{ secrets.REPOSITORY_NAME }}

jobs:
  build-and-deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Build Backend with Maven
        run: mvn clean package -DskipTests
        
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
          
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        
      - name: Configure Docker for GCP
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet
        
      - name: Build and Push Backend Docker Image
        id: docker-build-push-backend
        env:
          IMAGE_NAME: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend
        run: |
          # Build from root to allow resolving dependencies
          docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ github.sha }} -f docker/backend/Dockerfile .
          docker push $IMAGE_NAME --all-tags

      - name: Deploy Backend to Cloud Run
        id: deploy-backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: backend
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ github.sha }}
          # Existing config/env vars on the service are retained by default

  build-and-deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build
          
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/560215755306/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'wallet-run-sa@secure-p2p-wallet-app.iam.gserviceaccount.com'
          
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        
      - name: Configure Docker for GCP
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet
        
      - name: Build and Push Frontend Docker Image
        id: docker-build-push-frontend
        env:
          IMAGE_NAME: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend
        run: |
          # Build from root to allow resolving correctly if needed, matching dockerfile path
          docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ github.sha }} -f docker/frontend/Dockerfile .
          docker push $IMAGE_NAME --all-tags
          
      - name: Deploy Frontend to Cloud Run
        id: deploy-frontend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: frontend
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }}
