spring:
  application:
    name: p2p-wallet
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlite:wallet.db}
    driver-class-name: org.sqlite.JDBC
    # SQLite doesn't require username/password
    hikari:
      maximum-pool-size: 1
      minimum-idle: 1
      connection-timeout: 30000
      pool-name: WalletDBPool
  jpa:
    open-in-view: false 
    hibernate:
      ddl-auto: update # Changed to 'update' so Hibernate builds your SQLite tables
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.community.dialect.SQLiteDialect # SQLite Dialect
        jdbc:
          batch_size: 50
        order_updates: true
        order_inserts: true
  flyway:
    enabled: false # Disabled to prevent Postgres SQL scripts from crashing SQLite
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: ${PORT:10000}
  address: 0.0.0.0
  error:
    include-message: always

mail:
  from: ${MAIL_FROM:${SENDGRID_FROM_EMAIL:no-reply@wallet.local}}

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info,metrics

security:
  jwt:
    secret: ${JWT_SECRET:change-this-in-production-jwt-secret-key-minimum-32-bytes}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
  auth:
    otp-enabled: ${OTP_ENABLED:true}

payment:
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:}
    key-secret: ${RAZORPAY_KEY_SECRET:}
    currency: ${RAZORPAY_CURRENCY:INR}

app:
  upload-dir: ${APP_UPLOAD_DIR:uploads}
  encryption:
    bank-account-key: ${BANK_ACCOUNT_ENCRYPTION_KEY:local-dev-bank-key-change-before-prod}

withdrawal:
  processing:
    core-pool-size: ${WITHDRAWAL_PROCESSING_CORE_POOL_SIZE:2}
    max-pool-size: ${WITHDRAWAL_PROCESSING_MAX_POOL_SIZE:4}
    queue-capacity: ${WITHDRAWAL_PROCESSING_QUEUE_CAPACITY:100}

ai:
  provider: ${AI_PROVIDER:GEMINI}
  rate-limit:
    per-minute: ${AI_RATE_LIMIT_PER_MINUTE:30}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    url: ${OPENAI_URL:https://api.openai.com/v1/chat/completions}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    url: ${GEMINI_URL:https://generativelanguage.googleapis.com/v1beta/models}

logging:
  level:
    org.springframework: INFO
    com.yourapp: DEBUG

spring:
  main:
    lazy-initialization: true
    